<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sobre iframes</title>
</head>

<body>
    <h1>Conhecendo elemento Iframe</h1>
    <p>O elemento <code>&lt;iframe&gt;</code> permite incorporar
        outra página <strong>HTML</strong> dentro da página
        atual.</p>

    <h2>Criando iframe youtube</h2>

    <iframe width="400" height="400" src="https://www.youtube.com/embed/YJL90pkf7ko?si=bhRtOuVWn2Y1LLM9"
        title="Descrição com acessibilidade" frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

    <h2>Adicionando frame de mapa</h2>
    <iframe
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d14654.466347995158!2d-46.736719608306856!3d-23.32966600771702!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x94cee43fac3cf549%3A0xdd8b9d0757e7b288!2sFranco%20da%20Rocha!5e0!3m2!1spt-BR!2sbr!4v1780966736336!5m2!1spt-BR!2sbr"
        width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"
        referrerpolicy="no-referrer-when-downgrade"></iframe>

    <hr>
    <h2>exemplo pagina interna</h2>
    <iframe src="01-titulos.html" frameborder="0" width="400" height="400" name="meu frame" ></iframe>

    <hr>
    <h2>galeria de imagens com iframe</h2>
    <iframe src=""width="400" height="450" name="meuFrame" > </iframe>

<a href="assets/ho-desktop.jpg" target="meuFrame">Imagem 1</a>
<a href="assets/ho-mobile.jpg" target="meuFrame">Imagem 2</a>
<a href="assets/ho-tablet.jpg" target="meuFrame">Imagem 3</a>

</body>

</html>
